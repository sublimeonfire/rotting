<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Site</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background-image: url("meat.gif");
            background-repeat: repeat;
            background-size: 420px 520px; /* leve zoom pra quebrar padrão */
            background-position: top left;
        }

        /* camada por cima pra esconder emendas */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25); /* ajusta aqui se quiser mais escuro */
            pointer-events: none;
            z-index: 1;
        }

        /* conteúdo */
        .conteudo {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            padding-top: 100px;
            font-size: 30px;
            text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>

    <div class="conteudo">
        Seu site aqui por cima do GIF 🔥
    </div>

</body>
</html>
