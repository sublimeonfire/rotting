<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Site</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: black; /* cor de fundo pra preencher */
        }

        body {
            background: url("meat.gif") no-repeat center center fixed;
            background-size: contain; /* mantém proporção SEM zoom exagerado */
        }

        /* conteúdo */
        .conteudo {
            color: white;
            text-align: center;
            padding-top: 100px;
            font-size: 30px;
            text-shadow: 2px 2px 5px black;
        }

        /* leve overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .conteudo {
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="conteudo">
        Seu site aqui por cima do GIF 🔥
    </div>

</body>
</html>
