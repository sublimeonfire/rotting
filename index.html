<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Site</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        /* FUNDO DESFOCADO (preenche tudo) */
        .bg-blur {
            position: fixed;
            inset: 0;
            background: url("meat.gif") center center;
            background-size: cover;
            filter: blur(25px) brightness(0.6);
            transform: scale(1.2); /* evita bordas do blur */
            z-index: 0;
        }

        /* GIF PRINCIPAL (sem distorcer) */
        .bg-main {
            position: fixed;
            inset: 0;
            background: url("meat.gif") center center no-repeat;
            background-size: contain;
            z-index: 1;
        }

        /* conteúdo */
        .conteudo {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            padding-top: 100px;
            font-size: 30px;
            text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <div class="bg-main"></div>

    <div class="conteudo">
        Seu site aqui por cima do GIF 🔥
    </div>

</body>
</html>
